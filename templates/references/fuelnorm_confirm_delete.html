{% extends "base.html" %}
{% load static %}

{% block title %}Удалить норматив — Логистика 365{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white fw-bold">
                <i class="bi bi-exclamation-triangle me-2"></i>Подтверждение удаления
            </div>
            <div class="card-body">
                <p class="fs-5">Удалить норматив <strong>{{ object.vehicle_type }}</strong>?</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash me-1"></i>Удалить
                        </button>
                        <a href="{% url 'references:fuelnorm_list' %}" class="btn btn-outline-secondary">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
